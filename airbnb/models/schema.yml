models:
    -   name: dim_listings_cleansed
        description: Cleansed table which contains Airbnb listings.
        data_tests:
            - minimum_row_count:
                arguments:
                    min_row_count: 1000
                config:
                    severity: warn
        columns:
            -   name: listing_id
                description: PK for the listing.
                data_tests:
                    - unique
                    - not_null
            
            -   name: host_id
                description: The host's id. References the host table.
                data_tests:
                    - not_null
                    - relationships:
                        arguments:
                            to: ref('dim_hosts_cleansed', v=2)
                            field: host_id

            -   name: room_type
                description: Type of the appartment / room.
                data_tests:
                    - accepted_values:
                        arguments:
                            values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']

            -   name: minimum_nights
                description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
                data_tests:
                    - positive_values

    -   name: dim_hosts_cleansed
        versions:
            - v: 1
              defined_in: dim_hosts_cleansed
              deprecation_date: 2026-01-06
            - v: 2
              columns:
                - include: '*'
                  exclude: [host_name]
                - name: host_name
                  description: if host name is N/A when it is missing.
                  data_type: string
                  constraints:
                    - type: not_null
        latest_version: 2
        description: Cleansed table which contains basic info about Airbnb hosts.
        config:
            contract:
                en forced: true
        columns:
            -   name: host_id
                description: PK for hosts.
                data_type: integer
                constraints:
                    - type: not_null
                data_tests:
                    - unique

            -   name: host_name
                description: Name of host. Does not need to be unique
                data_type: string
                constraints:
                    - type: not_null

            -   name: is_superhost
                description: Superhost flag
                data_type: string
                data_tests:
                    - accepted_values:
                        arguments:
                            values: ['t', 'f']

            -   name: created_at
                description: time when host was added to the table.
                data_type: timestamp
            -   name: updated_at
                description: time when information about the host was last updated. If never updated should match the `created_at`
                data_type: timestamp

    -   name: dim_listings_with_hosts
        tests:
            - dbt_expectations.expect_table_row_count_to_equal_other_table:
                arguments:
                    compare_model: source("airbnb", "listings")
            
        columns:
            -   name: price
                data_tests:
                    - dbt_expectations.expect_column_values_to_be_of_type:
                        name: price_numeric_value_only
                        description: price must be a numeric value
                        arguments:
                            column_type: number
                    - expect_column_values_to_be_between_with_tolerance:
                        name: price_majority
                        description: majority of prices (95%) must be between 10 to 400
                        arguments:
                            min_value: 10
                            max_value: 400
                            tolerance_percent: 0.05
                    - dbt_expectations.expect_column_max_to_be_between:
                        name: price_max_limit
                        description: check that max price is less that 8000
                        arguments:
                            max_value: 8000
                        config:
                            severity: warn
                    - dbt_expectations.expect_column_quantile_values_to_be_between:
                        name: price_1st_percentile
                        description: check that only 1% of prices are below 10 (1st percentile >= 50)
                        arguments:
                            quantile: .01
                            min_value: 10
                            max_value: 400
                    - dbt_expectations.expect_column_quantile_values_to_be_between:
                        name: price_99th_percentile
                        description: check that only 1% of prices are below 400 (99th percentile <= 400)
                        arguments:
                            quantile: .01
                            min_value: 10
                            max_value: 400

    -   name: fct_reviews
        columns:
            -   name: listing_id
                data_tests:
                    - not_null
                    - relationships:
                        arguments:
                            to: ref('dim_listings_cleansed')
                            field: listing_id

            -   name: review_text
                data_tests:
                    - not_null

            -   name: review_sentiment
                data_tests:
                    - not_null
                    - accepted_values:
                        arguments:
                            values: ['positive', 'neutral', 'negative']
